services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: blackbox-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build:
      context: ./etl
    container_name: blackbox-etl
    profiles: [etl]
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./diary:/app/diary
      - "C:/Users/Bdfihn/AppData/Roaming/Apple Computer/MobileSync/Backup:/app/iphone_backup:ro"
      - "C:/Users/Bdfihn/Apple/MobileSync/Backup:/app/iphone_backup2:ro"
      - "C:/Users/Bdfihn/Code:/app/git_repos:ro"
      - "C:/Users/Bdfihn/.claude/projects:/app/claude_transcripts:ro"
    environment:
      - QDRANT_HOST=blackbox-qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - ACTIVITYWATCH_HOST=host.docker.internal
      - ACTIVITYWATCH_PORT=5600
      - TIMEZONE=America/New_York
      - TZ=America/New_York
      - IPHONE_BACKUP_PATH=/app/iphone_backup
      - IPHONE_BACKUP_PATH2=/app/iphone_backup2
      - IPHONE_BACKUP_PASSWORD=Overbook6-Around5-Viability3-Deviation7
      - GIT_REPOS_ROOT=/app/git_repos
      - CLAUDE_TRANSCRIPTS=/app/claude_transcripts
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  query:
    build:
      context: ./query
    container_name: blackbox-query
    depends_on:
      - qdrant
    ports:
      - "8080:8080"
    volumes:
      - ./diary:/app/diary
    environment:
      - QDRANT_HOST=blackbox-qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data: