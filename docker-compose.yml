services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: blackbox-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  etl:
    build:
      context: ./etl
    container_name: blackbox-etl
    depends_on:
      - qdrant
    volumes:
      - ./diary:/app/diary
      - ./data:/app/data
      - "C:/Users/Bdfihn/AppData/Roaming/Apple Computer/MobileSync/Backup:/app/iphone_backup:ro"
      - "C:/Users/Bdfihn/Apple/MobileSync/Backup:/app/iphone_backup2:ro"
    environment:
      - QDRANT_HOST=blackbox-qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - ACTIVITYWATCH_HOST=host.docker.internal
      - ACTIVITYWATCH_PORT=5600
      - TIMEZONE=America/New_York
      - TZ=America/New_York
      - IPHONE_BACKUP_PATH=/app/iphone_backup
      - IPHONE_BACKUP_PATH2=/app/iphone_backup2
      - IPHONE_BACKUP_PASSWORD=Overbook6-Around5-Viability3-Deviation7
    extra_hosts:
      - "host.docker.internal:host-gateway"

  query:
    build:
      context: ./query
    container_name: blackbox-query
    depends_on:
      - qdrant
    ports:
      - "8080:8080"
    volumes:
      - ./diary:/app/diary
      - ./data:/app/data
    environment:
      - QDRANT_HOST=blackbox-qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data: